name: Update Projections

on:
  schedule:
    - cron: '30 7 * * *'   # 2:30am CDT (UTC-5) — runs ~5-6am after GitHub delay
  workflow_dispatch:

jobs:
  project:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
      - name: Run projections
        run: |
          cd backend
          python -u projections.py 2>&1
      - name: Commit updated projections
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/projections_log.json
          git diff --staged --quiet || git commit -m "chore: update projections $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
